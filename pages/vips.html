<!-- pages/vips.html -->
<section id="vips">
  <div id="vips-container" class="archivos-container">
    <div class="input-box">
      <textarea id="vips-input" rows="3" placeholder="Pega aquí el texto separado por TAB o comas"></textarea>
    </div>

    <div id="vips-preview" class="preview-horizontal">
      <div class="preview-celda"><div class="titulo-celda">No. de Ticket</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">ID</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Cliente Ufinet</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Cliente Final</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Origen Reporte</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">No. Ticket Interno</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">N1 Asignado</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Causa</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Avance</div><div class="valor-celda"></div></div>
      <div class="preview-celda"><div class="titulo-celda">Bandwidth CRM</div><div class="valor-celda"></div></div>
    </div>

    <div class="button-group">
      <button id="btn-vips-load">📝 Llenar Formulario</button>
      <button id="btn-vips-clear">🗑️ Borrar Texto</button>
      <button id="btn-vips-copiar">📋 Copiar Tabla</button>
    </div>

    <div class="contenido-flex">
      <table class="tabla-formato" id="vips-tabla">
        <tr><th>No. de Ticket</th><td></td></tr>
        <tr><th>ID</th><td></td></tr>
        <tr><th>Cliente Ufinet</th><td></td></tr>
        <tr><th>Cliente Final</th><td></td></tr>
        <tr><th>Origen Reporte</th><td></td></tr>
        <tr><th>No. Ticket Interno</th><td></td></tr>
        <tr><th>N1 Asignado</th><td></td></tr>
        <tr><th>Causa</th><td></td></tr>
        <tr><th>Avance</th><td></td></tr>
        <tr><th>Bandwidth CRM</th><td></td></tr>
      </table>
    </div>
  </div>
</section>
