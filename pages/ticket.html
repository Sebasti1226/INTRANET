<!-- === pages/ticket.html === -->
<div class="ticket-container">
  <h2>Creación de Ticket</h2>
  <form>

    <div class="input-group">
    <label for="ticket">Número de Ticket:</label>
    <input type="text" id="ticket" placeholder="Ingrese el ticket">
    </div>


   <div class="input-group">
  <label for="idioma">Idioma:</label>
  <select id="idioma">
    <option value="">Seleccione</option>
    <option value="espanol">Español</option>
    <option value="ingles">Inglés</option>
    <option value="portugues">Português (Brasil)</option>
  </select>
</div>

  <div id="mensaje" class="mensaje-recuadro"></div>

    <div class="buttons">
      <button type="button" id="generarBtn">Generar</button>
      <button type="button" id="copiarBtn">Copiar</button>
      <button type="button" id="borrarBtn">Borrar</button>
    </div>
  </form>

</div>
